name: VPS ETERNA - INTERFAZ PREMIUM (HTTP FORZADO)

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  vps-session:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: "1. Preparar Entorno"
        uses: actions/checkout@v4

      - name: "2. Recuperar Archivos (Caché)"
        id: cache-vps
        uses: actions/cache/restore@v4
        with:
          path: VPS_DATA
          key: vps-storage-${{ github.run_id }}
          restore-keys: |
            vps-storage-

      - name: "3. Preparar Almacenamiento"
        run: |
          if [ ! -d "VPS_DATA" ]; then
            echo "🆕 Creando almacenamiento..."
            mkdir -p VPS_DATA
            echo "Bienvenido a tu nueva VPS. Sube aquí los archivos de tu bot." > VPS_DATA/LEEME.txt
          fi

      - name: "4. Instalar VS Code Web"
        run: |
          echo "⏳ Instalando Visual Studio Code en la Web..."
          curl -fsSL https://code-server.dev/install.sh | sh
          
          # Arrancar VS Code. OJO: Contraseña eliminada, ya no es necesaria.
          sudo code-server \
            --bind-addr 127.0.0.1:8080 \
            --auth none \
            --user-data-dir $(pwd)/VPS_DATA \
            $(pwd)/VPS_DATA > code-server.log 2>&1 &
          
          sleep 5

      - name: "5. Conectar a TU DOMINIO (HTTP Forzado)"
        run: |
          # Tu dominio exacto
          DOMINIO="tl.mcpe.qzz.io"
          
          echo "Conectando $DOMINIO a Localhost.run..."
          # Generar llave SSH temporal
          ssh-keygen -t rsa -b 2048 -f ~/.ssh/id_rsa -N "" -q
          
          # 🚀 ESTA ES LA MAGIA: Conecta tu dominio al puerto 8080 (donde está VS Code)
          # Localhost.run es más estable para HTTP directo.
          ssh -o StrictHostKeyChecking=no -R $DOMINIO:80:localhost:8080 ssh.localhost.run > tunnel.log 2>&1 &
          
          sleep 10

      - name: "6. Datos de Acceso"
        run: |
          echo "=================================================================="
          echo "✅ VPS OPERATIVA - ACCESO WEB DIRECTO"
          echo "=================================================================="
          echo "La conexión ya no usa HTTPS, sino HTTP. ¡No fallará!"
          echo ""
          echo "🌐 URL DE ACCESO (Siempre la misma):"
          echo "   http://tl.mcpe.qzz.io"
          echo ""
          echo "🔑 SIN CONTRASEÑA: Entras directamente a la interfaz."
          echo "=================================================================="
          
          sleep 20700 

      - name: "7. Guardar en la Nube (Caché)"
        if: always()
        uses: actions/cache/save@v4
        with:
          path: VPS_DATA
          key: vps-storage-${{ github.run_id }}

      - name: "8. Reinicio Automático (Bucle)"
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run "main.yml" --ref main
          echo "Nueva máquina arrancando..."
